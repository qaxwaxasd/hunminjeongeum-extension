<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>훈민정음</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="logo">
      <img src="icons/icon48.png" alt="Logo" width="24" height="24">
      <span>훈민정음</span>
      <svg class="loading-spinner" id="loading-spinner" viewBox="0 0 50 50" style="display: none;">
        <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
      </svg>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggle-service" checked>
      <span class="slider round"></span>
    </label>
  </div>

  <div class="engine-status" id="engine-status">
    <span class="engine-dot" id="engine-dot"></span>
    <span id="engine-text">확인 중...</span>
  </div>

  <div class="content">
    <div class="stats-card">
      <div class="stat-item">
        <span class="stat-label typo">오타 교정</span>
        <span class="stat-value" id="stat-typo">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label grammar">문법 교정</span>
        <span class="stat-value" id="stat-grammar">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label spacing">띄어쓰기</span>
        <span class="stat-value" id="stat-spacing">0</span>
      </div>
    </div>
  </div>

  <div class="actions">
    <button id="copy-all-btn" class="btn btn-secondary">전체 텍스트 복사</button>
    <button id="open-dashboard-btn" class="btn btn-primary">통계 대시보드 열기</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
